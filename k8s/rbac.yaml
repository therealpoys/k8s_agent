apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8s-agent
  namespace: default

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8s-agent-reader
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8s-agent-reader-binding
subjects:
  - kind: ServiceAccount
    name: k8s-agent
    namespace: default
roleRef:
  kind: ClusterRole
  name: k8s-agent-reader
  apiGroup: rbac.authorization.k8s.io

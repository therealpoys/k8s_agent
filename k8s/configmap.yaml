apiVersion: v1
kind: ConfigMap
metadata:
  name: k8s-agent-config
  namespace: default
data:
  config.yaml: |
    llm:
      provider: ollama
      model: qwen3:8b
      timeout_seconds: 60
      # base_url wird über LLM_BASE_URL env var gesetzt (siehe deployment.yaml)

    kubernetes:
      namespaces:
        - default
      log_lines: 100

    plugins:
      core:
        - pod_logs
      optional:
        trivy: false
        falco: false
        prometheus: false

    outputs:
      - console

    loop_interval_seconds: 60

    debug:
      log_llm_io: false
